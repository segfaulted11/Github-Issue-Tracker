<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
        <!-- tailwind n daisy khalamoni -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<nav class="navbar bg-base-100 shadow-sm flex justify-between">

    <div class="flex gap-2">
    <img src="./img/github-logo.png" class="size-8" alt="">
    <h1 class="font-bold text-2xl">Github Issue Tracker</h1>
    </div>

    <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto"/>
    <button class="btn btn-primary">+ New Issue</button>
    </div>
</nav>

<header class="navbar bg-base-300 shadow-sm w-9/12 mx-auto mt-14 rounded-md p-5 flex gap-2">
<button class="btn px-10" id="btn-1">All</button>
<button class="btn px-10" id="btn-2">Open</button>
<button class="btn px-10" id="btn-3">Closed</button>
</header>

<div class="navbar bg-base-300 shadow-sm w-9/12 mx-auto mt-14 rounded-md p-5 flex flex-col">

<section id="top-content" class="navbar shadow-sm rounded-md flex justify-between">
    <div>
    <img src="./img/Aperture.png" alt="">
    <h1 class="font-bold text-xl" id="issue">50 Issues</h1>
    <p>Track and manage your project issues</p>
    </div>
    <div class="">
    <span>Open</span>
    <span>Closed</span>
    </div>
</section>

<section id="main-content" class="grid grid-cols-3 gap-4 mt-6">
</section>

</div>


<dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">


    <div class="" id="issueDetailContainer"></div>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog> 

<section class="flex justify-center items-center py-10 hidden" id="spinner">
<span class="loading loading-bars loading-xl"></span>
</section>

<script src="./main.js"></script>
</body>
</html>
